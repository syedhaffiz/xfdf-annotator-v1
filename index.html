<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XFDF Annotator</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- Fabric.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

  <style>
    /* ── Reset & Base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e2e; color: #cdd6f4; }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .app { display: flex; height: 100vh; }

    /* ── Toolbar (left sidebar) ────────────────────────────────────────── */
    #toolbar-panel {
      width: 56px; background: #181825; display: flex; flex-direction: column;
      align-items: center; padding: 8px 0; gap: 4px; border-right: 1px solid #313244;
      flex-shrink: 0; overflow-y: auto;
    }
    #toolbar-panel.view-mode .tool-btn { opacity: .35; pointer-events: none; }

    .toolbar-section { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .toolbar-divider { width: 32px; height: 1px; background: #45475a; margin: 6px 0; }

    .mode-btn, .tool-btn, .action-btn {
      width: 40px; height: 40px; border: none; border-radius: 8px;
      background: transparent; color: #cdd6f4; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: background .15s;
    }
    .mode-btn:hover, .tool-btn:hover, .action-btn:hover { background: #313244; }
    .mode-btn.active { background: #585b70; color: #cba6f7; }
    .tool-btn.active { background: #45475a; color: #89b4fa; }

    /* ── Center: Viewer ────────────────────────────────────────────────── */
    #viewer-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

    /* Top bar */
    .top-bar {
      height: 44px; background: #181825; border-bottom: 1px solid #313244;
      display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0;
    }
    .top-bar .doc-info { display: flex; flex-direction: column; gap: 1px; }
    #doc-title { font-size: 13px; font-weight: 600; color: #cdd6f4; }
    #doc-meta { font-size: 11px; color: #6c7086; }
    .top-bar .spacer { flex: 1; }
    #user-id-display {
      font-size: 11px; background: #313244; padding: 2px 8px; border-radius: 4px; color: #a6adc8;
    }

    /* Empty state */
    #empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; color: #585b70;
    }
    #empty-state .icon { font-size: 48px; }
    #empty-state p { font-size: 14px; }

    /* Loading overlay */
    #loading-overlay {
      display: none; position: absolute; inset: 44px 0 0 0;
      background: rgba(30,30,46,.85); z-index: 50;
      flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #45475a;
      border-top-color: #89b4fa; border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Document viewport */
    #document-viewport {
      display: none; flex: 1; overflow: auto; padding: 24px;
      background: #11111b; align-items: flex-start; justify-content: center;
    }

    #pages-container { display: flex; flex-direction: column; align-items: center; gap: 24px; }

    .page-wrapper { position: relative; }
    .page-number-label {
      text-align: center; font-size: 11px; color: #6c7086;
      margin-bottom: 4px; user-select: none;
    }
    .page-layers { position: relative; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,.4); }
    .page-layers canvas.pdf-layer,
    .page-layers img.image-layer { display: block; }

    /* ── Right sidebar: Activity Log ───────────────────────────────────── */
    .sidebar-right {
      width: 260px; background: #181825; border-left: 1px solid #313244;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-header {
      height: 44px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px; border-bottom: 1px solid #313244; font-size: 13px; font-weight: 600;
    }
    .sidebar-header button {
      background: none; border: none; color: #6c7086; cursor: pointer; font-size: 12px;
    }
    .sidebar-header button:hover { color: #cdd6f4; }

    #log-entries { flex: 1; overflow-y: auto; padding: 8px; }

    .log-empty { text-align: center; color: #585b70; font-size: 12px; padding: 24px 0; }

    .log-entry {
      background: #1e1e2e; border-radius: 6px; padding: 8px 10px;
      margin-bottom: 6px; font-size: 12px; border-left: 3px solid #45475a;
    }
    .log-entry.action-added { border-left-color: #a6e3a1; }
    .log-entry.action-removed { border-left-color: #f38ba8; }
    .log-entry-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .log-badge {
      font-size: 10px; padding: 1px 6px; border-radius: 3px;
      background: #45475a; color: #cdd6f4; text-transform: uppercase; font-weight: 600;
    }
    .log-badge.added { background: #1e4620; color: #a6e3a1; }
    .log-badge.removed { background: #4c1d24; color: #f38ba8; }
    .log-time { color: #6c7086; font-size: 11px; }
    .log-detail { display: flex; gap: 8px; color: #a6adc8; }
    .log-tool-name { font-weight: 600; }
    .log-page { color: #6c7086; }
    .log-user { color: #585b70; font-size: 10px; margin-top: 2px; }

    /* ── Polygon hint ──────────────────────────────────────────────────── */
    #polygon-hint {
      display: none; position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: #313244; color: #cdd6f4; padding: 8px 16px; border-radius: 8px;
      font-size: 12px; gap: 12px; z-index: 100; box-shadow: 0 4px 12px rgba(0,0,0,.4);
    }

    /* ── Comment pins ──────────────────────────────────────────────────── */
    .comment-pin {
      position: absolute; cursor: pointer; z-index: 20; transform: translate(-50%, -100%);
    }
    .comment-pin-badge {
      width: 24px; height: 24px; border-radius: 50%; background: #cba6f7;
      color: #1e1e2e; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .comment-pin.active .comment-pin-badge { background: #f38ba8; }
    .comment-pin-tip {
      width: 0; height: 0; margin: 0 auto;
      border-left: 5px solid transparent; border-right: 5px solid transparent;
      border-top: 6px solid #cba6f7;
    }
    .comment-pin.active .comment-pin-tip { border-top-color: #f38ba8; }

    /* ── Comment thread panel ──────────────────────────────────────────── */
    #comment-thread-panel {
      display: none; position: fixed; width: 280px; max-height: 360px;
      background: #1e1e2e; border: 1px solid #313244; border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5); z-index: 200;
      flex-direction: column; overflow: hidden;
    }
    .ctp-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-bottom: 1px solid #313244; font-weight: 600; font-size: 13px;
    }
    .ctp-close {
      background: none; border: none; color: #6c7086; font-size: 18px; cursor: pointer; line-height: 1;
    }
    .ctp-close:hover { color: #cdd6f4; }
    .ctp-messages { flex: 1; overflow-y: auto; padding: 8px 12px; }
    .ctp-message { margin-bottom: 10px; }
    .ctp-msg-header { display: flex; gap: 8px; align-items: baseline; margin-bottom: 2px; }
    .ctp-msg-user { font-weight: 600; font-size: 12px; color: #89b4fa; }
    .ctp-msg-time { font-size: 10px; color: #6c7086; }
    .ctp-msg-text { font-size: 13px; color: #cdd6f4; line-height: 1.4; }
    .ctp-reply-bar {
      display: flex; gap: 6px; padding: 8px 12px; border-top: 1px solid #313244;
    }
    .ctp-reply-input {
      flex: 1; padding: 6px 10px; border-radius: 6px; border: 1px solid #45475a;
      background: #181825; color: #cdd6f4; font-size: 12px; outline: none;
    }
    .ctp-reply-input:focus { border-color: #89b4fa; }
    .ctp-reply-btn {
      padding: 6px 12px; border: none; border-radius: 6px;
      background: #89b4fa; color: #1e1e2e; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .ctp-reply-btn:hover { background: #74c7ec; }

    /* ── New comment popup ─────────────────────────────────────────────── */
    #new-comment-popup {
      display: none; position: fixed; width: 260px;
      background: #1e1e2e; border: 1px solid #313244; border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5); z-index: 200; padding: 12px;
    }
    #new-comment-popup textarea {
      width: 100%; height: 72px; resize: none; padding: 8px;
      background: #181825; border: 1px solid #45475a; border-radius: 6px;
      color: #cdd6f4; font-size: 13px; outline: none; font-family: inherit;
    }
    #new-comment-popup textarea:focus { border-color: #89b4fa; }
    .popup-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 8px; }
    .popup-actions button {
      padding: 6px 14px; border: none; border-radius: 6px; font-size: 12px;
      font-weight: 600; cursor: pointer;
    }
    #btn-cancel-comment { background: #313244; color: #cdd6f4; }
    #btn-post-comment { background: #a6e3a1; color: #1e1e2e; }
    #btn-post-comment:hover { background: #94e2d5; }

    /* ── Toast ──────────────────────────────────────────────────────────── */
    #toast-container {
      position: fixed; bottom: 20px; right: 20px; z-index: 999;
      display: flex; flex-direction: column-reverse; gap: 8px;
    }
    .toast {
      padding: 10px 16px; border-radius: 8px; font-size: 13px;
      box-shadow: 0 4px 12px rgba(0,0,0,.4); color: #cdd6f4; min-width: 200px;
    }
    .toast.info    { background: #313244; }
    .toast.success { background: #1e4620; color: #a6e3a1; }
    .toast.error   { background: #4c1d24; color: #f38ba8; }

    /* ── Color & Brush controls in toolbar ─────────────────────────────── */
    .toolbar-control { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .toolbar-control label { font-size: 9px; color: #6c7086; }
    #color-picker { width: 32px; height: 24px; border: none; padding: 0; cursor: pointer; background: none; }
    #brush-size { width: 40px; writing-mode: vertical-lr; direction: rtl; }
    #brush-size-val { font-size: 10px; color: #6c7086; }

    /* ── Misc ──────────────────────────────────────────────────────────── */
    .hidden-input { display: none; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #585b70; }
  </style>
</head>
<body>
  <div class="app">
    <!-- ── Left Toolbar ──────────────────────────────────────────────── -->
    <div id="toolbar-panel">
      <div class="toolbar-section">
        <button class="mode-btn active" data-mode="edit" title="Edit mode (annotate)">&#9998;</button>
        <button class="mode-btn" data-mode="view" title="View mode (read-only)">&#128065;</button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-section">
        <button class="tool-btn active" data-tool="select" title="Select (V)">&#9995;</button>
        <button class="tool-btn" data-tool="freehand" title="Freehand (P)">&#9999;</button>
        <button class="tool-btn" data-tool="line" title="Line (L)">&#9585;</button>
        <button class="tool-btn" data-tool="arrow" title="Arrow (A)">&rarr;</button>
        <button class="tool-btn" data-tool="rectangle" title="Rectangle (R)">&#9633;</button>
        <button class="tool-btn" data-tool="circle" title="Ellipse (C)">&#9675;</button>
        <button class="tool-btn" data-tool="polygon" title="Polygon (G)">&#11039;</button>
        <button class="tool-btn" data-tool="text" title="Text (T)">T</button>
        <button class="tool-btn" data-tool="comment" title="Comment (M)">&#128172;</button>
        <button class="tool-btn" data-tool="image" title="Image stamp (I)">&#128247;</button>
        <button class="tool-btn" data-tool="eraser" title="Eraser (E)">&#128465;</button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-control">
        <label>Color</label>
        <input type="color" id="color-picker" value="#f38ba8" />
      </div>

      <div class="toolbar-control">
        <label>Size</label>
        <input type="range" id="brush-size" min="1" max="20" value="3" />
        <span id="brush-size-val">3px</span>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-section">
        <button class="action-btn" id="btn-open-file" title="Open file">&#128194;</button>
        <button class="action-btn" id="btn-save" title="Save XFDF" disabled>&#128190;</button>
        <button class="action-btn" id="btn-load-xfdf" title="Load XFDF">&#128228;</button>
      </div>
    </div>

    <!-- ── Center: Viewer ────────────────────────────────────────────── -->
    <div id="viewer-panel">
      <div class="top-bar">
        <div class="doc-info">
          <span id="doc-title">No document loaded</span>
          <span id="doc-meta"></span>
        </div>
        <div class="spacer"></div>
        <span id="user-id-display"></span>
      </div>

      <!-- Empty state -->
      <div id="empty-state">
        <div class="icon">&#128196;</div>
        <p>Open a PDF or image to start annotating</p>
        <button id="btn-open-empty" style="padding:8px 20px;border:1px solid #45475a;border-radius:8px;background:#313244;color:#cdd6f4;cursor:pointer;font-size:13px;">Open File</button>
      </div>

      <!-- Loading overlay -->
      <div id="loading-overlay">
        <div class="spinner"></div>
        <span>Loading document&hellip;</span>
      </div>

      <!-- Document viewport -->
      <div id="document-viewport">
        <div id="pages-container"></div>
      </div>
    </div>

    <!-- ── Right Sidebar: Activity Log ───────────────────────────────── -->
    <div class="sidebar-right">
      <div class="sidebar-header">
        <span>Activity Log</span>
        <button id="btn-clear-log">Clear</button>
      </div>
      <div id="log-entries">
        <div class="log-empty">No activity yet</div>
      </div>
    </div>
  </div>

  <!-- ── Polygon hint ──────────────────────────────────────────────── -->
  <div id="polygon-hint">
    <span>Click to add points</span>
    <span>&middot; Enter to close</span>
    <span>&middot; Esc to cancel</span>
  </div>

  <!-- ── Comment thread panel ──────────────────────────────────────── -->
  <div id="comment-thread-panel">
    <div class="ctp-header">
      <span class="ctp-pin-num"></span>
      <button class="ctp-close">&times;</button>
    </div>
    <div class="ctp-messages"></div>
    <div class="ctp-reply-bar">
      <input class="ctp-reply-input" type="text" placeholder="Reply&hellip;" />
      <button class="ctp-reply-btn">Send</button>
    </div>
  </div>

  <!-- ── New comment popup ─────────────────────────────────────────── -->
  <div id="new-comment-popup">
    <textarea placeholder="Add a comment&hellip;"></textarea>
    <div class="popup-actions">
      <button id="btn-cancel-comment">Cancel</button>
      <button id="btn-post-comment">Post</button>
    </div>
  </div>

  <!-- ── Hidden file inputs ────────────────────────────────────────── -->
  <input type="file" id="file-input" class="hidden-input" accept=".pdf,.png,.jpg,.jpeg,.gif,.webp,.svg,.bmp" />
  <input type="file" id="image-insert-input" class="hidden-input" accept="image/*" />
  <input type="file" id="xfdf-input" class="hidden-input" accept=".xfdf" />

  <!-- ── Toast container ───────────────────────────────────────────── -->
  <div id="toast-container"></div>

  <!-- ── App entry point ───────────────────────────────────────────── -->
  <script type="module" src="main.js"></script>
</body>
</html>
